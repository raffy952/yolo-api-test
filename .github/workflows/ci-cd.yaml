name: YOLO API - Build and Push

on:
  push:
    branches:
      - main
      - monitoring_with_Grafana_and_Prometeus
  # Questo permette di avviare il workflow anche manualmente dall'interfaccia di GitHub
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Prende in automatico "tuo_utente/nome_repository"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Permessi essenziali per permettere a GitHub Actions di caricare l'immagine
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Configura Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Usa il token integrato di GitHub per fare il login senza bisogno di configurare segreti
      - name: Login al Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker richiede che i nomi delle immagini siano in minuscolo. Questo step previene errori.
      - name: Converti il nome immagine in minuscolo
        run: echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Estrai i metadati (Tag e Label)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            # Tagga come "latest" SOLO sul branch main
            type=raw,value=latest,enable={{is_default_branch}}
            # Sui branch di feature crea un tag con il nome del branch (es. monitoring-with-grafana-and-prometeus)
            # cosi' puoi testare senza sovrascrivere ":latest"
            type=ref,event=branch
            # Crea anche un tag univoco basato sull'hash del commit per tracciabilità
            type=sha,format=long

      - name: Build and Push dell'immagine Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Usa la cache di GitHub Actions per velocizzare enormemente le build successive
          cache-from: type=gha
          cache-to: type=gha,mode=max