events {
    worker_connections 1024;
}

http {
    # Mappa i log per vederli facilmente su Docker
    access_log /dev/stdout;
    error_log /dev/stderr;

    upstream yolo_backend {
        server yolo-api:8000;
    }

    upstream grafana_backend {
        server grafana:3000;
    }

    upstream prometheus_backend {
        server prometheus:9090;
    }

    # Tutto il traffico in chiaro sulla 80 viene reindirizzato a HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Fondamentale per la Computer Vision: permette upload di immagini fino a 20 MB
        client_max_body_size 20M;

        location / {
            proxy_pass http://yolo_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout estesi per l'elaborazione del tensore e l'inferenza YOLO
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Dashboard Grafana raggiungibile su https://localhost/grafana/
        location /grafana/ {
            # NIENTE slash finale dopo grafana_backend: Grafana gira con subUrl=/grafana
            # (GF_SERVER_SERVE_FROM_SUB_PATH=true), si aspetta il prefisso intatto.
            proxy_pass http://grafana_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Prometheus raggiungibile su https://localhost/prometheus/, protetto da login
        location /prometheus/ {
            auth_basic "Area riservata - Prometheus";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # NIENTE slash finale: Prometheus gira con --web.route-prefix=/prometheus/
            proxy_pass http://prometheus_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
