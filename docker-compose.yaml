services:
  yolo-api:
    image: ghcr.io/raffy952/yolo-api-test:latest
    environment:
      # Formato: mssql+pyodbc://UTENTE:PASSWORD@SERVER:PORTA/NOME_DB?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
      - DB_CONNECTION_STRING=mssql+pyodbc://tecno:tecno!@host.docker.internal:1433/NomeDelTuoDB?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
    container_name: yolo_api
    restart: always
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
    networks:
      - vision_net

  reverse-proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - yolo-api
    networks:
      - vision_net

networks:
  vision_net:
    driver: bridge