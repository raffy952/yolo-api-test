services:
  yolo-api:
    image: ghcr.io/raffy952/yolo-api-test:monitoring_with_Grafana_and_Prometeus
    environment:
      # Formato: mssql+pyodbc://UTENTE:PASSWORD@SERVER:PORTA/NOME_DB?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
      - DB_CONNECTION_STRING=mssql+pyodbc://tecno:tecno@host.docker.internal:1433/YoloVisionDB?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
    container_name: yolo_api
    restart: unless-stopped
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
    networks:
      - vision_net

  reverse-proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - yolo-api
      - grafana
    networks:
      - vision_net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      # Esposto direttamente per poter navigare la UI di Prometheus da http://localhost:9090
      # Su un server esposto a internet valuta di rimuoverla e passare da Nginx come per Grafana.
      - "9090:9090"
    depends_on:
      - yolo-api
    networks:
      - vision_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      # Cambia la password admin al primo accesso, oppure impostala qui
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
      # Necessario perché Grafana è raggiungibile tramite Nginx sotto /grafana/
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - vision_net

networks:
  vision_net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: