apiVersion: 1

datasources:
  # Metriche tecniche/real-time (richieste, latenza, errori, contatori di business)
  # Raggiunto dentro la rete Docker interna. IMPORTANTE: il path /prometheus deve
  # esserci anche qui (non solo nel routing Nginx), perche' Prometheus gira con
  # --web.route-prefix=/prometheus/ e quindi serve TUTTE le sue API sotto quel
  # prefisso, comprese quelle che Grafana usa per interrogarlo.
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090/prometheus
    isDefault: true
    editable: true

  # Dati storici completi dalla tabella yolo_predictions (persone rilevate, timestamp, bbox)
  # Le credenziali vengono lette dalle variabili d'ambiente DB_USER/DB_PASSWORD
  # (impostate nel docker-compose.yaml a partire dal file .env), grazie a
  # GF_ENABLE_ENVIRONMENT_VARIABLE_EXPANSION=true.
  - name: SQL Server - YoloVisionDB
    uid: mssql-yolovision
    type: mssql
    access: proxy
    url: $__env{DB_SERVER}:$__env{DB_PORT}
    database: $__env{DB_NAME}
    user: $__env{DB_USER}
    editable: true
    jsonData:
      encrypt: "true"
      tlsSkipVerify: true
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
    secureJsonData:
      password: $__env{DB_PASSWORD}